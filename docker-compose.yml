services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: files-api
    env_file:
      - .env
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: files-frontend
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=http://api:3000
    ports:
      - '5173:5173'
    depends_on:
      - api
